<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FEYKAZ Downloader</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg-blur bg1"></div>
<div class="bg-blur bg2"></div>

<div class="container">

<div class="header">

<div class="logo">
FEYKAZ
</div>

<h1>Video Downloader</h1>

<p>
devid malas ngodinnkkk
</p>

<button id="themeToggle" class="theme-toggle">
🌙 Dark Mode
</button>

</div>

<div class="input-group">

<input
type="text"
id="urlInput"
placeholder="Tempel link video disini..."
>

<button id="fetchBtn" class="btn-download">
⬇ Download
</button>

</div>

<div class="info-box">
💡 Tempel link video → Klik Download → Simpan ke perangkat
</div>

<div id="resultArea" class="result-card">

<div class="video-preview">

<video
id="previewVideo"
controls
playsinline
preload="metadata">
</video>

</div>

<div class="video-info">

<span
id="videoMeta"
class="meta-text">
🎬 Video Preview
</span>

<div class="action-buttons">

<a
id="downloadLink"
class="action-btn primary"
download>
📥 Download Video
</a>

</div>

</div>

</div>

<div
id="errorMessage"
class="error-msg"
style="display:none;">
</div>

<footer>
© 2026 FEYKAZ Downloader
</footer>

</div>

<script>
const themeBtn =
document.getElementById("themeToggle");

const savedTheme =
localStorage.getItem("theme");

if(savedTheme === "dark"){
document.body.classList.add("dark");
themeBtn.innerHTML = "☀️ Light Mode";
}

themeBtn.onclick = () => {

document.body.classList.toggle("dark");

const isDark =
document.body.classList.contains("dark");

if(isDark){

localStorage.setItem("theme","dark");

themeBtn.innerHTML =
"☀️ Light Mode";

}else{

localStorage.setItem("theme","light");

themeBtn.innerHTML =
"🌙 Dark Mode";

}

};
</script>

<script src="script.js"></script>

</body>
</html>
